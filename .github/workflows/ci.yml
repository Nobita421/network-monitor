name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    name: Lint / Typecheck / Test / Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm v9 matches the lockfileVersion: '9.0' in pnpm-lock.yaml
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Use --no-frozen-lockfile to avoid version mismatch issues in CI
      # (lockfileVersion 9.0 can be sensitive to exact pnpm patch version)
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Compile only: tsc + vite renderer build
      # Skips electron-builder packaging and geoip download (not needed in CI)
      - name: Build (tsc + vite renderer)
        run: pnpm exec tsc && pnpm exec vite build
