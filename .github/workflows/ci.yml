name: CI — Type Check & Build

on:
  push:
    branches: [feat/ui-ux-redesign, master]
  pull_request:
    branches: [master]

jobs:
  typecheck-and-build:
    name: TypeScript Check & Vite Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Lint check
        run: pnpm exec eslint src --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

      - name: Build renderer (Vite)
        run: pnpm exec vite build --config vite.config.renderer.ts
        env:
          NODE_ENV: production
